name: CEO Agent

on:
  workflow_dispatch:
  schedule:
    # Hourly, 24/7 (24 runs/day, up from 14) — increased rotation so the CEO
    # triages proposals, processes L1/L2/L3 verifier outputs, and tops up the
    # ai-fix queue toward its cap more aggressively. The backlog cap in PROMPT.md
    # still bounds how much it promotes, so more runs refill faster without
    # overflowing Roadie's queue. Timezone-agnostic (every hour), so no DST edit.
    - cron: '0 * * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two CEO instances in parallel — avoids races on metrics.md
concurrency:
  group: ceo-agent
  cancel-in-progress: false

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project deps
        run: npm ci --no-audit --no-fund

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write service-account credentials
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Configure git author
        # Use Ricardo's identity so Vercel's Git Authorization recognises the
        # committer and doesn't block previews. Agent identity is preserved in
        # the commit message prefix (`ceo:`) and via run logs / artifacts.
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Fetch fresh GA4 + GSC metrics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: node .agents/scripts/fetch-metrics.cjs

      - name: Rotate decisions-log (archive entries >7d)
        # Keeps the hot log gerível for the CEO Agent to read each run.
        # Idempotent: no-op when nothing to rotate. Older entries move to
        # .agents/ceo/decisions-history/YYYY-MM.md (one file per month).
        run: node .agents/scripts/rotate-decisions-log.cjs

      - name: Run CEO agent via Claude Code CLI
        env:
          # Subscription auth (Pro/Max) instead of pay-per-use API billing.
          # CLI uses the OAuth token when ANTHROPIC_API_KEY is absent.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 2nd subscription — run-claude.sh fails over to it when the primary
          # hits its session/usage limit, so a maxed-out plan doesn't kill the run.
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: |
          cat .agents/ceo/PROMPT.md | bash .agents/scripts/run-claude.sh

      - name: Commit state changes from this run
        if: always()
        run: |
          git add .agents/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CEO state changes to commit."
          else
            git commit -m "ceo: autonomous run state update [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; sleeping $((attempt * 2))s and retrying"
              sleep $((attempt * 2))
              git pull --rebase origin main || true
            done
          fi

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ceo-agent-run-${{ github.run_id }}
          path: .agents/ceo/run.log
          retention-days: 14
          if-no-files-found: ignore
