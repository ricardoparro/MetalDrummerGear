name: CEO Agent

on:
  workflow_dispatch:
  schedule:
    # 3x/day UTC — ~08:00 / 14:00 / 20:00 Lisbon (winter)
    - cron: '0 7,13,19 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two CEO instances in parallel — avoids races on metrics.md
concurrency:
  group: ceo-agent
  cancel-in-progress: false

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project deps
        run: npm ci --no-audit --no-fund

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write service-account credentials
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Configure git for the bot user
        run: |
          git config user.name "ceo-agent[bot]"
          git config user.email "ceo-agent@users.noreply.github.com"

      - name: Fetch fresh GA4 metrics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node .agents/scripts/fetch-metrics.cjs

      - name: Run CEO agent via Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          cat .agents/ceo/PROMPT.md | claude --print --dangerously-skip-permissions

      - name: Commit state changes from this run
        if: always()
        run: |
          git add .agents/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CEO state changes to commit."
          else
            git commit -m "ceo: autonomous run state update [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; sleeping $((attempt * 2))s and retrying"
              sleep $((attempt * 2))
              git pull --rebase origin main || true
            done
          fi

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ceo-agent-run-${{ github.run_id }}
          path: .agents/ceo/run.log
          retention-days: 14
          if-no-files-found: ignore
