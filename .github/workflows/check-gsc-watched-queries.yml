name: Check GSC watched queries

# L1 v2 — GSC scan-all-queries verifier. Fetches EVERY query the GSC property
# surfaced for the last 7 days, diffs each one against the most recent prior
# weekly run (stored under .agents/seo/gsc-history/), classifies into
# big-loss / disappeared / ctr-gap-opportunity / big-win / new / null / noise.
#
# Outputs:
#   - .agents/seo/gsc-watch-snapshot.md (every query, grouped by class) — the
#     CEO Agent reads this on every run.
#   - Umbrella issue `gsc-watch` (only ACTIONABLE rows: big-loss, disappeared,
#     ctr-gap-opportunity).
#   - .agents/seo/gsc-history/YYYY-MM-DD.json — next run's baseline.
#
# Secrets reused from CEO agent: GA_SERVICE_ACCOUNT_JSON + GSC_SITE.

on:
  workflow_dispatch:
  schedule:
    # Mondays 08:00 UTC, after broken-images (06:30) and llm-citations (07:30).
    - cron: '0 8 * * 1'

permissions:
  contents: write
  issues: write

concurrency:
  group: check-gsc-watched-queries
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project deps (for googleapis)
        run: npm ci --no-audit --no-fund

      - name: Configure git author
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Write GSC service-account credentials
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Run GSC scan-all crawler
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: |
          node .agents/scripts/check-gsc-watched-queries.cjs \
            --history-dir .agents/seo/gsc-history \
            --out gsc-watch.json

      - name: Render issue body + snapshot
        run: |
          node .agents/scripts/render-gsc-watch-issue.cjs \
            --report gsc-watch.json \
            --issue issue-body.md \
            --snapshot .agents/seo/gsc-watch-snapshot.md

      - name: Ensure umbrella label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create gsc-watch \
            --repo "${{ github.repository }}" \
            --color C5DEF5 \
            --description "Auto-managed by check-gsc-watched-queries.yml — single umbrella issue per repo" \
            2>/dev/null || true

      - name: Summarize
        id: summary
        run: |
          ACTIONABLE=$(cat /tmp/gsc-watch-actionable-count.txt 2>/dev/null || echo 0)
          echo "actionable=${ACTIONABLE}" >> "$GITHUB_OUTPUT"
          node -e '
            const r = require("./gsc-watch.json");
            const fs = require("fs");
            const c = r.counts || {};
            const wins = c["big-win"] || 0;
            fs.appendFileSync(process.env.GITHUB_OUTPUT,
              `wins=${wins}\ntotal=${r.queriesTotal}\n`);
          '

      - name: Find existing umbrella issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n=$(gh issue list \
                --repo "${{ github.repository }}" \
                --state open \
                --label gsc-watch \
                --json number,title \
                --jq '[.[] | select(.title | startswith("GSC watch"))][0].number // ""')
          echo "number=$n" >> "$GITHUB_OUTPUT"

      - name: Open / update / close umbrella issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONABLE: ${{ steps.summary.outputs.actionable }}
          WINS: ${{ steps.summary.outputs.wins }}
          TOTAL: ${{ steps.summary.outputs.total }}
          EXISTING: ${{ steps.existing.outputs.number }}
        run: |
          set -euo pipefail
          if [ "$ACTIONABLE" = "0" ]; then
            if [ -n "$EXISTING" ]; then
              echo "No actionable rows — closing issue #$EXISTING."
              gh issue close "$EXISTING" \
                --repo "${{ github.repository }}" \
                --comment "🤖 Weekly GSC scan on $(date -u +%Y-%m-%d): 0 actionable rows out of ${TOTAL} queries (${WINS} wins recorded in snapshot). Closing."
            else
              echo "All clear, no existing issue."
            fi
          else
            TITLE="GSC watch — ${ACTIONABLE} actionable rows, ${WINS} wins / ${TOTAL} queries"
            if [ -n "$EXISTING" ]; then
              echo "Updating #$EXISTING."
              gh issue edit "$EXISTING" \
                --repo "${{ github.repository }}" \
                --title "$TITLE" \
                --body-file issue-body.md
              gh issue comment "$EXISTING" \
                --repo "${{ github.repository }}" \
                --body "🤖 Weekly GSC watch refreshed $(date -u +%Y-%m-%dT%H:%MZ): ${ACTIONABLE} actionable, ${WINS} wins / ${TOTAL} queries."
            else
              echo "Opening new umbrella issue."
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "$TITLE" \
                --body-file issue-body.md \
                --label gsc-watch \
                --label seo-proposal
            fi
          fi

      - name: Commit snapshot + new history file
        run: |
          # Stage everything that might have changed: snapshot + history dir.
          git add .agents/seo/gsc-watch-snapshot.md .agents/seo/gsc-history/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "seo: refresh GSC scan-all snapshot [skip ci]"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $attempt"
              break
            fi
            echo "Push attempt $attempt failed; sleeping $((attempt * 2))s"
            sleep $((attempt * 2))
            git pull --rebase origin ${{ github.ref_name }} || true
          done

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-watch-${{ github.run_id }}
          path: |
            gsc-watch.json
            issue-body.md
            .agents/seo/gsc-watch-snapshot.md
          retention-days: 90
          if-no-files-found: ignore
