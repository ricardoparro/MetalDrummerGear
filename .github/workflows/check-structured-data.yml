name: Check structured data

# Structured-Data (JSON-LD) validation verifier. For a type-balanced, priority-
# ordered sample of URLs in metalforge.io/sitemap.xml, fetch the rendered HTML,
# extract every `<script type="application/ld+json">`, and assert the Google-
# required fields per `@type`. Catches the class of bug GSC flags as
# "VideoObject — Missing field uploadDate" BEFORE Google does.
#
# Outputs:
#   - .agents/seo/structured-data-snapshot.md (every scanned URL, by class)
#   - Umbrella issue `structured-data` (actionable failures only)
#   - .agents/seo/structured-data-history/YYYY-MM-DD.json (next run's baseline)
#
# No external API / no secret beyond GITHUB_TOKEN — it just fetches public HTML.
#
# Specs: .agents/scripts/check-structured-data.cjs + docs/structured-data-loop.md

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max URLs to sample this run (cap)'
        required: false
        default: '150'
  schedule:
    # Mondays 10:00 UTC, after L3 (09:00), L1 (08:00), L2 (07:30), broken-images (06:30).
    - cron: '0 10 * * 1'

permissions:
  contents: write
  issues: write

concurrency:
  group: check-structured-data
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git author
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Sanity — rule-engine self-test
        run: node .agents/scripts/check-structured-data.cjs --self-test

      - name: Run structured-data crawler
        env:
          LIMIT: ${{ inputs.limit || '150' }}
        run: |
          node .agents/scripts/check-structured-data.cjs \
            --history-dir .agents/seo/structured-data-history \
            --limit "$LIMIT" \
            --json structured-data.json

      - name: Render issue body + snapshot
        run: |
          node .agents/scripts/render-structured-data-issue.cjs \
            --report structured-data.json \
            --issue issue-body.md \
            --snapshot .agents/seo/structured-data-snapshot.md

      - name: Ensure umbrella label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create structured-data \
            --repo "${{ github.repository }}" \
            --color 5319E7 \
            --description "Auto-managed by check-structured-data.yml — single umbrella issue per repo" \
            2>/dev/null || true

      - name: Summarize
        id: summary
        run: |
          ACTIONABLE=$(cat /tmp/structured-data-actionable-count.txt 2>/dev/null || echo 0)
          echo "actionable=${ACTIONABLE}" >> "$GITHUB_OUTPUT"
          node -e '
            const r = require("./structured-data.json");
            const fs = require("fs");
            const c = r.counts || {};
            const clean = c.ok || 0;
            fs.appendFileSync(process.env.GITHUB_OUTPUT,
              `scanned=${r.sampledCount}\nclean=${clean}\nsitemap_total=${r.sitemapUrlCount}\n`);
          '

      - name: Find existing umbrella issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n=$(gh issue list \
                --repo "${{ github.repository }}" \
                --state open \
                --label structured-data \
                --json number,title \
                --jq '[.[] | select(.title | startswith("Structured-data"))][0].number // ""')
          echo "number=$n" >> "$GITHUB_OUTPUT"

      - name: Open / update / close umbrella issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONABLE: ${{ steps.summary.outputs.actionable }}
          SCANNED: ${{ steps.summary.outputs.scanned }}
          CLEAN: ${{ steps.summary.outputs.clean }}
          EXISTING: ${{ steps.existing.outputs.number }}
        run: |
          set -euo pipefail
          if [ "$ACTIONABLE" = "0" ]; then
            if [ -n "$EXISTING" ]; then
              echo "No actionable failures — closing issue #$EXISTING."
              gh issue close "$EXISTING" \
                --repo "${{ github.repository }}" \
                --comment "🤖 Weekly structured-data check on $(date -u +%Y-%m-%d): 0 actionable failures. Clean: ${CLEAN}/${SCANNED} scanned. Closing."
            else
              echo "All clear, no existing issue."
            fi
          else
            TITLE="Structured-data validation — ${ACTIONABLE} actionable, ${CLEAN}/${SCANNED} clean"
            if [ -n "$EXISTING" ]; then
              echo "Updating #$EXISTING."
              gh issue edit "$EXISTING" \
                --repo "${{ github.repository }}" \
                --title "$TITLE" \
                --body-file issue-body.md
              gh issue comment "$EXISTING" \
                --repo "${{ github.repository }}" \
                --body "🤖 Weekly structured-data check refreshed $(date -u +%Y-%m-%dT%H:%MZ): ${ACTIONABLE} actionable, ${CLEAN}/${SCANNED} clean."
            else
              echo "Opening new umbrella issue."
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "$TITLE" \
                --body-file issue-body.md \
                --label structured-data \
                --label seo
            fi
          fi

      - name: Commit snapshot + history
        run: |
          git add .agents/seo/structured-data-snapshot.md .agents/seo/structured-data-history/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "seo: refresh structured-data snapshot [skip ci]"
          for attempt in 1 2 3 4; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Pushed on attempt $attempt"; break
            fi
            echo "Push attempt $attempt failed; sleeping $((attempt * 2))s"
            sleep $((attempt * 2))
            git pull --rebase origin ${{ github.ref_name }} || true
          done

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structured-data-${{ github.run_id }}
          path: |
            structured-data.json
            issue-body.md
            .agents/seo/structured-data-snapshot.md
          retention-days: 90
          if-no-files-found: ignore
