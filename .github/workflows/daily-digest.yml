name: Daily Digest

on:
  workflow_dispatch:
  schedule:
    # 08:00 and 19:00 UTC = morning + evening Lisbon (summer: 09 / 20)
    - cron: '0 8,19 * * *'

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read

# Don't race a digest with itself
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Write service-account credentials (for metrics refresh)
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Refresh GA4 + GSC metrics (best-effort; digest still runs if this fails)
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: node .agents/scripts/fetch-metrics.cjs

      - name: Configure git author
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Generate digest + push to Telegram
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DIGEST_BRANCH: digest
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node .agents/scripts/generate-digest.cjs

      - name: Publish DIGEST.md to the `digest` branch
        # The `digest` branch is a snapshot branch — no branch protection, no PR
        # required. Each run rewrites it as `main + 1 commit with the new digest`,
        # so the URL https://github.com/<repo>/blob/digest/DIGEST.md is always the
        # latest snapshot. Force-push is safe: this branch is write-only for the
        # digest workflow and nobody else depends on its history.
        run: |
          # Stash the just-generated artefacts off the worktree.
          mkdir -p /tmp/digest-payload
          cp DIGEST.md /tmp/digest-payload/ 2>/dev/null || true
          if [ -d .agents/digest ]; then cp -r .agents/digest /tmp/digest-payload/digest-state; fi
          cp .agents/ceo/metrics.md /tmp/digest-payload/metrics.md 2>/dev/null || true

          # Reset the worktree to a clean origin/main, then carve a fresh `digest`
          # branch from main (no inherited junk, no protected-branch baggage).
          git checkout -- . 2>/dev/null || true
          git clean -fd
          git checkout -B digest origin/main

          # Re-apply the payload.
          cp /tmp/digest-payload/DIGEST.md . 2>/dev/null || true
          mkdir -p .agents/digest .agents/ceo
          if [ -d /tmp/digest-payload/digest-state ]; then cp -r /tmp/digest-payload/digest-state/. .agents/digest/; fi
          cp /tmp/digest-payload/metrics.md .agents/ceo/metrics.md 2>/dev/null || true

          git add DIGEST.md .agents/digest/ .agents/ceo/metrics.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi

          git commit -m "digest: $(date -u +%FT%H:%MZ)"

          # Force-push the snapshot branch.
          for attempt in 1 2 3 4; do
            if git push origin digest --force; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; sleeping $((attempt * 2))s and retrying"
            sleep $((attempt * 2))
          done
          echo "Push failed after 4 attempts"
          exit 1
