name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  statuses: read
  checks: read
  deployments: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Get Vercel Preview URL from Deployments API
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request?.head?.sha || context.sha;
            const isPR = !!context.payload.pull_request;
            
            console.log(`SHA: ${sha}`);
            console.log(`Is PR: ${isPR}`);
            
            if (!isPR) {
              console.log('Not a PR, using production URL');
              core.setOutput('url', 'https://metalforge.io');
              core.setOutput('is_preview', 'false');
              return;
            }
            
            // Wait for Vercel deployment (up to 5 minutes)
            const maxAttempts = 30;
            const delayMs = 10000;
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`\nAttempt ${attempt}/${maxAttempts}...`);
              
              try {
                // Get deployments for this SHA using GitHub Deployments API
                const { data: deployments } = await github.rest.repos.listDeployments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: sha,
                  per_page: 10
                });
                
                console.log(`Found ${deployments.length} deployments`);
                
                // Find Preview deployments
                for (const deployment of deployments) {
                  console.log(`  - Deployment ${deployment.id}: ${deployment.environment}`);
                  
                  if (deployment.environment !== 'Preview') continue;
                  
                  // Get deployment statuses to find the environment URL
                  const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    deployment_id: deployment.id,
                    per_page: 5
                  });
                  
                  // Find successful status with environment_url
                  const successStatus = statuses.find(s => 
                    s.state === 'success' && s.environment_url
                  );
                  
                  if (successStatus) {
                    const url = successStatus.environment_url;
                    console.log(`✅ Found Vercel preview URL: ${url}`);
                    core.setOutput('url', url);
                    core.setOutput('is_preview', 'true');
                    return;
                  }
                }
              } catch (e) {
                console.log(`Error checking deployments: ${e.message}`);
              }
              
              if (attempt < maxAttempts) {
                console.log(`Waiting ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }
            
            console.log('⚠️ Could not find Vercel preview URL, using production');
            core.setOutput('url', 'https://metalforge.io');
            core.setOutput('is_preview', 'false');
      
      - name: Wait for deployment to be accessible
        id: health
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.url }}
          IS_PREVIEW: ${{ steps.vercel.outputs.is_preview }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Preview URL: $PREVIEW_URL"
          echo "Is Preview: $IS_PREVIEW"
          
          # Build test URL with bypass if available
          if [ "$IS_PREVIEW" = "true" ] && [ -n "$VERCEL_BYPASS" ]; then
            echo "Using Vercel deployment protection bypass"
            TEST_URL="${PREVIEW_URL}?x-vercel-protection-bypass=${VERCEL_BYPASS}"
            API_URL="${PREVIEW_URL}/api/drummers?x-vercel-protection-bypass=${VERCEL_BYPASS}"
          else
            TEST_URL="$PREVIEW_URL"
            API_URL="${PREVIEW_URL}/api/drummers"
          fi
          
          MAX_ATTEMPTS=15
          DELAY=10
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS..."
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TEST_URL" 2>/dev/null || echo "000")
            echo "HTTP Status: $HTTP_STATUS"
            
            # 200 = OK, 308 = Vercel redirect (sometimes happens)
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "308" ]; then
              # Verify API works
              API_CHECK=$(curl -s "$API_URL" 2>/dev/null | head -c 5)
              
              if [ "$API_CHECK" = "[{\"id" ] || [ "$API_CHECK" = "[{\"na" ]; then
                echo "✅ Deployment is healthy!"
                echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
                echo "healthy=true" >> $GITHUB_OUTPUT
                
                # Pass bypass to tests if available
                if [ -n "$VERCEL_BYPASS" ] && [ "$IS_PREVIEW" = "true" ]; then
                  echo "bypass=$VERCEL_BYPASS" >> $GITHUB_OUTPUT
                fi
                exit 0
              else
                echo "API response: $API_CHECK"
              fi
            fi
            
            # Check if it's a Vercel auth page (deployment protection)
            if [ "$HTTP_STATUS" = "200" ]; then
              AUTH_CHECK=$(curl -s "$TEST_URL" 2>/dev/null | grep -c "Authentication Required" || echo "0")
              if [ "$AUTH_CHECK" != "0" ]; then
                echo "⚠️ Preview requires authentication"
                if [ -z "$VERCEL_BYPASS" ]; then
                  echo "No VERCEL_AUTOMATION_BYPASS_SECRET set, will use production"
                  break
                fi
              fi
            fi
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${DELAY}s..."
              sleep $DELAY
            fi
          done
          
          # Fallback to production
          echo "⚠️ Preview not accessible, checking production..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://metalforge.io")
          if [ "$HTTP_STATUS" = "200" ]; then
            API_CHECK=$(curl -s "https://metalforge.io/api/drummers" | head -c 5)
            if [ "$API_CHECK" = "[{\"id" ]; then
              echo "✅ Using production as fallback"
              echo "url=https://metalforge.io" >> $GITHUB_OUTPUT
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "❌ Neither preview nor production accessible"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1
      
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.health.outputs.url }}
          API_URL: ${{ steps.health.outputs.url }}
          VERCEL_BYPASS: ${{ steps.health.outputs.bypass }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let testDetails = 'See workflow artifacts for screenshots and full report.';
            try {
              const files = fs.readdirSync('test-results');
              if (files.length > 0) {
                testDetails = 'Failed tests:\n' + files.map(f => '- ' + f).join('\n');
              }
            } catch (e) {}
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '## 🔄 E2E Tests Failed Again\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n' + testDetails
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[E2E] Tests failed - Site may be broken',
                body: '## 🚨 E2E Tests Failed\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n### Details\n' + testDetails + '\n\n### What to check\n- Are all drummer images loading?\n- Do drummer detail pages render?\n- Is there a JavaScript error?\n\n---\n*Auto-generated by GitHub Actions*',
                labels: ['bug', 'ai-fix', 'e2e-failure']
              });
            }
