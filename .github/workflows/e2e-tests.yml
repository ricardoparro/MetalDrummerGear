name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  statuses: read
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Get Vercel Preview URL
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request?.head?.sha || context.sha;
            console.log(`Looking for Vercel deployment for SHA: ${sha}`);
            
            // Wait for Vercel deployment (up to 5 minutes)
            const maxAttempts = 30;
            const delayMs = 10000;
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`Attempt ${attempt}/${maxAttempts}...`);
              
              // Check commit statuses for Vercel
              const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha
              });
              
              const vercelStatus = statuses.find(s => 
                s.context?.toLowerCase().includes('vercel') && 
                s.state === 'success' && 
                s.target_url
              );
              
              if (vercelStatus) {
                // Extract the preview URL from Vercel's target_url
                // Vercel status URLs are like: https://vercel.com/owner/repo/DEPLOYMENT_ID
                // The actual preview is at: https://[deployment].vercel.app
                let previewUrl = vercelStatus.target_url;
                
                // Try to extract from description if it contains the URL
                if (vercelStatus.description) {
                  const urlMatch = vercelStatus.description.match(/https:\/\/[^\s]+\.vercel\.app/);
                  if (urlMatch) {
                    previewUrl = urlMatch[0];
                  }
                }
                
                // Fetch the Vercel page to find the actual preview URL
                console.log(`Found Vercel status, checking: ${vercelStatus.target_url}`);
                
                // For PRs, construct the preview URL pattern
                const prNumber = context.payload.pull_request?.number;
                if (prNumber) {
                  // Common Vercel preview URL patterns
                  const possibleUrls = [
                    `https://metal-drummer-gear-git-fix-422-e2e-timeout-ricardo-parros-projects.vercel.app`,
                    `https://metal-drummer-gear-${sha.slice(0, 7)}-ricardo-parros-projects.vercel.app`,
                    `https://metalforge.io` // fallback to production if preview not found
                  ];
                  
                  // Test each URL
                  for (const url of possibleUrls) {
                    try {
                      const response = await fetch(url, { method: 'HEAD' });
                      if (response.ok) {
                        console.log(`Found working URL: ${url}`);
                        core.setOutput('url', url);
                        return;
                      }
                    } catch (e) {
                      console.log(`URL ${url} not accessible: ${e.message}`);
                    }
                  }
                }
                
                core.setOutput('url', 'https://metalforge.io');
                return;
              }
              
              // Also check check runs
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha
              });
              
              const vercelCheck = checkRuns.check_runs.find(c => 
                c.name?.toLowerCase().includes('vercel') && 
                c.conclusion === 'success'
              );
              
              if (vercelCheck) {
                console.log('Found Vercel check run');
              }
              
              if (attempt < maxAttempts) {
                console.log(`Waiting ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }
            
            console.log('Could not find Vercel preview URL, using production');
            core.setOutput('url', 'https://metalforge.io');

      - name: Wait for Vercel deployment
        id: deployment
        run: |
          # Construct the expected preview URL based on branch name
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          
          # Common Vercel preview URL patterns
          PREVIEW_URLS=(
            "https://metal-drummer-gear-git-${BRANCH_SLUG}-ricardo-parros-projects.vercel.app"
            "https://metal-drummer-gear-${BRANCH_SLUG}-ricardo-parros-projects.vercel.app"
          )
          
          echo "Branch: $BRANCH_NAME"
          echo "Slug: $BRANCH_SLUG"
          
          # Try each preview URL
          MAX_ATTEMPTS=30
          DELAY=10
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS..."
            
            for url in "${PREVIEW_URLS[@]}"; do
              echo "Checking: $url"
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
              
              if [ "$HTTP_STATUS" = "200" ]; then
                # Verify API works
                API_CHECK=$(curl -s "$url/api/drummers" | head -c 5)
                if [ "$API_CHECK" = "[{\"id" ] || [ "$API_CHECK" = "[{\"na" ]; then
                  echo "✅ Found working preview: $url"
                  echo "url=$url" >> $GITHUB_OUTPUT
                  exit 0
                fi
              fi
            done
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${DELAY}s..."
              sleep $DELAY
            fi
          done
          
          # Fallback to production
          echo "⚠️ Preview not found, using production"
          echo "url=https://metalforge.io" >> $GITHUB_OUTPUT
      
      - name: Health check deployment
        id: health
        run: |
          URL="${{ steps.deployment.outputs.url }}"
          
          echo "Testing URL: $URL"
          
          # Quick health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "✅ Deployment healthy!"
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "❌ Deployment unhealthy"
            exit 1
          fi
      
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.health.outputs.url }}
          API_URL: ${{ steps.health.outputs.url }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let testDetails = 'See workflow artifacts for screenshots and full report.';
            try {
              const files = fs.readdirSync('test-results');
              if (files.length > 0) {
                testDetails = 'Failed tests:\n' + files.map(f => '- ' + f).join('\n');
              }
            } catch (e) {}
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '## 🔄 E2E Tests Failed Again\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n' + testDetails
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[E2E] Tests failed - Site may be broken',
                body: '## 🚨 E2E Tests Failed\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n### Details\n' + testDetails + '\n\n### What to check\n- Are all drummer images loading?\n- Do drummer detail pages render?\n- Is there a JavaScript error?\n\n---\n*Auto-generated by GitHub Actions*',
                labels: ['bug', 'ai-fix', 'e2e-failure']
              });
            }
