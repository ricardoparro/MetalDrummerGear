name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  deployments: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Wait for Vercel deployment
        run: |
          echo "Waiting for Vercel deployment..."
          sleep 90
      
      - name: Get deployment URL
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            // For PRs, try to get the Vercel preview URL from deployment statuses
            if (context.eventName === 'pull_request') {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.ref,
                per_page: 5
              });
              
              for (const deployment of deployments) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id
                });
                
                const success = statuses.find(s => s.state === 'success');
                if (success && success.environment_url) {
                  console.log('Found preview URL:', success.environment_url);
                  core.setOutput('url', success.environment_url);
                  return;
                }
              }
            }
            
            // Fallback to production
            console.log('Using production URL');
            core.setOutput('url', 'https://metalforge.io');
      
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.deployment.outputs.url }}
          API_URL: ${{ steps.deployment.outputs.url }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let testDetails = 'See workflow artifacts for screenshots and full report.';
            try {
              const files = fs.readdirSync('test-results');
              if (files.length > 0) {
                testDetails = 'Failed tests:\n' + files.map(f => '- ' + f).join('\n');
              }
            } catch (e) {}
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '## 🔄 E2E Tests Failed Again\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n' + testDetails
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[E2E] Tests failed - Site may be broken',
                body: '## 🚨 E2E Tests Failed\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n### Details\n' + testDetails + '\n\n### What to check\n- Are all drummer images loading?\n- Do drummer detail pages render?\n- Is there a JavaScript error?\n\n---\n*Auto-generated by GitHub Actions*',
                labels: ['bug', 'ai-fix', 'e2e-failure']
              });
            }
