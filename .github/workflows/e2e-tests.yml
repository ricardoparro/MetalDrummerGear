name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  deployments: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Wait for Vercel deployment
        id: deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
        continue-on-error: true
      
      - name: Set deployment URL
        id: url
        run: |
          if [ -n "${{ steps.deployment.outputs.url }}" ]; then
            echo "url=${{ steps.deployment.outputs.url }}" >> $GITHUB_OUTPUT
            echo "Using Vercel preview URL: ${{ steps.deployment.outputs.url }}"
          else
            echo "url=https://metalforge.io" >> $GITHUB_OUTPUT
            echo "Falling back to production URL"
          fi
      
      - name: Health check deployment
        id: health
        run: |
          PREVIEW_URL="${{ steps.url.outputs.url }}"
          PRODUCTION_URL="https://metalforge.io"
          URL="$PREVIEW_URL"
          
          echo "Checking health of: $URL"
          
          # Wait for deployment to be ready with retries
          MAX_RETRIES=10
          RETRY_DELAY=15
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            
            # Check if homepage returns 200
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Homepage status: $HTTP_STATUS"
            
            # If preview returns 401 (protected deployment), fallback to production
            if [ "$HTTP_STATUS" = "401" ] && [ "$URL" = "$PREVIEW_URL" ]; then
              echo "⚠️ Preview deployment is protected (401). Falling back to production URL."
              URL="$PRODUCTION_URL"
              echo "url=$URL" >> $GITHUB_OUTPUT
              continue
            fi
            
            if [ "$HTTP_STATUS" = "200" ]; then
              # Check if API returns valid JSON
              API_RESPONSE=$(curl -s "$URL/api/drummers" | head -c 20)
              if echo "$API_RESPONSE" | grep -q '^\['; then
                echo "✅ Deployment is healthy!"
                echo "healthy=true" >> $GITHUB_OUTPUT
                echo "url=$URL" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "⚠️ API not returning JSON yet: $API_RESPONSE"
              fi
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "❌ Deployment health check failed after $MAX_RETRIES attempts"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1
      
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.health.outputs.url || steps.url.outputs.url }}
          API_URL: ${{ steps.health.outputs.url || steps.url.outputs.url }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let testDetails = 'See workflow artifacts for screenshots and full report.';
            try {
              const files = fs.readdirSync('test-results');
              if (files.length > 0) {
                testDetails = 'Failed tests:\n' + files.map(f => '- ' + f).join('\n');
              }
            } catch (e) {}
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '## 🔄 E2E Tests Failed Again\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n' + testDetails
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[E2E] Tests failed - Site may be broken',
                body: '## 🚨 E2E Tests Failed\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n### Details\n' + testDetails + '\n\n### What to check\n- Are all drummer images loading?\n- Do drummer detail pages render?\n- Is there a JavaScript error?\n\n---\n*Auto-generated by GitHub Actions*',
                labels: ['bug', 'ai-fix', 'e2e-failure']
              });
            }
