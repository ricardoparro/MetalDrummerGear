name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  statuses: read
  checks: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Get Vercel Preview URL
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            
            if (!prNumber) {
              console.log('Not a PR, using production URL');
              core.setOutput('url', 'https://metalforge.io');
              return;
            }
            
            console.log(`Looking for Vercel preview URL for PR #${prNumber}`);
            
            // Wait for Vercel deployment (up to 5 minutes)
            const maxAttempts = 30;
            const delayMs = 10000;
            
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`Attempt ${attempt}/${maxAttempts}...`);
              
              // Get PR comments to find Vercel bot comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              // Find Vercel bot comment
              const vercelComment = comments.find(c => 
                c.body?.includes('[vc]:') || 
                c.body?.includes('vercel.app') ||
                c.user?.login?.includes('vercel')
              );
              
              if (vercelComment) {
                console.log('Found Vercel comment');
                
                // Extract preview URL from markdown table or JSON
                // Format: [Preview](https://xxx.vercel.app)
                const previewMatch = vercelComment.body.match(/\[Preview\]\((https:\/\/[^)]+\.vercel\.app)\)/);
                if (previewMatch) {
                  const url = previewMatch[1];
                  console.log(`Found preview URL: ${url}`);
                  
                  // Verify URL is accessible
                  try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok || response.status === 308) {
                      console.log(`Preview URL is accessible!`);
                      core.setOutput('url', url);
                      return;
                    }
                    console.log(`URL returned status ${response.status}`);
                  } catch (e) {
                    console.log(`URL not accessible yet: ${e.message}`);
                  }
                }
                
                // Also try to extract from previewUrl in the encoded JSON
                const previewUrlMatch = vercelComment.body.match(/"previewUrl":"([^"]+\.vercel\.app)"/);
                if (previewUrlMatch) {
                  const url = `https://${previewUrlMatch[1]}`;
                  console.log(`Found preview URL from JSON: ${url}`);
                  
                  try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok || response.status === 308) {
                      console.log(`Preview URL is accessible!`);
                      core.setOutput('url', url);
                      return;
                    }
                  } catch (e) {
                    console.log(`URL not accessible yet: ${e.message}`);
                  }
                }
              }
              
              if (attempt < maxAttempts) {
                console.log(`Waiting ${delayMs/1000}s...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }
            
            console.log('Could not find Vercel preview URL, using production');
            core.setOutput('url', 'https://metalforge.io');
      
      - name: Health check deployment
        id: health
        run: |
          URL="${{ steps.vercel.outputs.url }}"
          
          echo "Testing URL: $URL"
          
          # Wait for deployment to be fully ready
          MAX_RETRIES=10
          DELAY=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Status: $HTTP_STATUS"
            
            if [ "$HTTP_STATUS" = "200" ]; then
              # Verify API works
              API_CHECK=$(curl -s "$URL/api/drummers" | head -c 10)
              if echo "$API_CHECK" | grep -q '^\['; then
                echo "healthy=true" >> $GITHUB_OUTPUT
                echo "url=$URL" >> $GITHUB_OUTPUT
                echo "✅ Deployment healthy!"
                exit 0
              fi
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Waiting ${DELAY}s..."
              sleep $DELAY
            fi
          done
          
          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "❌ Deployment unhealthy, using production fallback"
          echo "url=https://metalforge.io" >> $GITHUB_OUTPUT
      
      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.health.outputs.url }}
          API_URL: ${{ steps.health.outputs.url }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
      
      - name: Create issue on failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let testDetails = 'See workflow artifacts for screenshots and full report.';
            try {
              const files = fs.readdirSync('test-results');
              if (files.length > 0) {
                testDetails = 'Failed tests:\n' + files.map(f => '- ' + f).join('\n');
              }
            } catch (e) {}
            
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'e2e-failure',
              state: 'open'
            });
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: '## 🔄 E2E Tests Failed Again\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n' + testDetails
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[E2E] Tests failed - Site may be broken',
                body: '## 🚨 E2E Tests Failed\n\n**Commit:** `' + context.sha.slice(0,7) + '`\n**Run:** [#' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n### Details\n' + testDetails + '\n\n### What to check\n- Are all drummer images loading?\n- Do drummer detail pages render?\n- Is there a JavaScript error?\n\n---\n*Auto-generated by GitHub Actions*',
                labels: ['bug', 'ai-fix', 'e2e-failure']
              });
            }
