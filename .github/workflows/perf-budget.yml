name: Perf Budget Gate

# Phase 3 of epic #4407 (#4410): locks in the bundle-size win from phases 1-2
# so JS weight can't silently regress again. Two cheap, deterministic checks
# after a real production build:
#   1. Bundle budget - index-*.js + __common-*.js raw size vs perf-budgets.json.
#   2. Homepage request-graph - serve dist/ + the real /api/init handler,
#      load `/` in headless chromium, fail if a scroll-gated route chunk
#      (albumArticles, top10Lists) loads eagerly or an image is fetched twice.

on:
  pull_request:
    paths:
      - 'packages/frontend/**'
      - 'api/init/**'
      - 'perf-budgets.json'
      - 'scripts/check-bundle-budget.mjs'
      - 'scripts/check-homepage-request-graph.mjs'
      - 'scripts/build.sh'
      - '.github/workflows/perf-budget.yml'
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - 'api/init/**'
      - 'perf-budgets.json'
      - 'scripts/check-bundle-budget.mjs'
      - 'scripts/check-homepage-request-graph.mjs'
      - 'scripts/build.sh'
      - '.github/workflows/perf-budget.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf-budget:
    runs-on: ubuntu-latest
    name: Bundle budget + homepage request graph
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        # Some runner images pre-cache browsers at /opt/pw-browsers with
        # PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 set, which would make this a
        # silent no-op if chromium isn't actually in that cache. Force a
        # real install for this job so the request-graph check always has
        # a working browser.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'
        run: npx playwright install --with-deps chromium

      - name: Build
        run: bash scripts/build.sh

      - name: Check bundle budget
        run: node scripts/check-bundle-budget.mjs

      - name: Check homepage request graph
        run: node scripts/check-homepage-request-graph.mjs
