name: Ralph (Watcher + Implementer)

# Drains the ENTIRE open issue queue (ANY label, or none — not just `ai-fix`):
# implements every eligible issue, one branch + PR each, finishing only when no
# issues remain (or the wall-clock guard trips — GitHub kills jobs at 6h, so we
# stop cleanly at ~5h20m and the next run resumes). Eligibility (incl. the
# human-flagged / non-actionable / hold exclusions) is decided in .ralph/drain.sh.
# Replaces the local Ralph + the one-issue-per-run implementer.yml.
# Specs: .ralph/AGENT.md, .agents/github-watcher/WATCHER-AGENT.md

on:
  # React when an issue is opened or reopened. NOT on `labeled` — we churn
  # labels constantly (in-progress/pr-opened/promotions), and each label change
  # fired a full drain run, which was a large, mostly-redundant Actions cost.
  issues:
    types: [opened, reopened]
  # Daytime safety-net poll only (every 2h, 08–22 UTC). Nights are covered by
  # ralph-night-fleet.yml — running this single worker then just competed with
  # the fleet for the Claude subscription rate limit and burned Actions minutes.
  schedule:
    - cron: '13 8-22/2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two drains at once — they'd race on branches/labels.
concurrency:
  group: ralph-implementer
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # drain.sh self-guards at 320 min, under GitHub's 6h cap
    # drain.sh decides eligibility for every issue; no label gate here.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps + Claude Code CLI
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm install -g @anthropic-ai/claude-code

      - name: Configure git author
        # Ricardo's identity so Vercel's Git Authorization recognises the committer
        # and runs preview/build checks (required for the merger to see CLEAN PRs).
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Drain the issue queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Subscription auth (Pro/Max) instead of pay-per-use API billing.
          # CLI uses the OAuth token when ANTHROPIC_API_KEY is absent.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x .ralph/drain.sh
          .ralph/drain.sh

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-run-${{ github.run_id }}
          path: .agents/ralph-runs/
          retention-days: 14
          if-no-files-found: ignore
