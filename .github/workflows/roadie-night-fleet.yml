name: Roadie Night Fleet

# 6 parallel Roadie workers concentrated in the Lisbon night window, to push PR
# throughput toward the 60–80 PRs/day target. Each matrix worker runs the same
# .roadie/drain.sh but with a distinct ROADIE_WORKER_OFFSET, so they claim
# DIFFERENT issues from the same eligible queue. Workers coordinate via the
# `in-progress` label + drain.sh's pre-PR dup guard, so they never double-ship
# an issue. Runs alongside the all-day single-worker roadie.yml (separate
# concurrency group); together they cover the night at ~6-wide.
#
# Parallelism: the albumArticles monolith was split into per-drummer modules, so
# the merge-conflict ceiling that used to cap us (every worker editing the one big
# file → DIRTY pile-ups) is gone — workers now touch different per-drummer files
# and merge cleanly. The remaining ceiling is the Claude subscription rate limit,
# so 6-wide here is "try and watch for plateau": if PR output doesn't rise versus
# the old 4-wide, the subscription TIER is the cap, not this number — don't keep
# bumping it past the point throughput stops climbing.
#
# Auth: subscription (CLAUDE_CODE_OAUTH_TOKEN). ⚠️ Even on Max 20x, 6 concurrent
# agentic workers can hit the rolling 5h usage limit — if PR output plateaus
# well under target, the subscription tier (not this workflow) is the ceiling.
#
# Window: cover Lisbon 20:00 → 08:00 (12h) at 6-wide. A single Actions job is
# hard-killed at 6h, so one launch can't span 12h — we stagger THREE 4h shifts
# (WALL_CAP_MIN=240) back-to-back so coverage is continuous and never overlapping
# (overlap would double the concurrent workers and blow the subscription limit).
#
# ⚠️ TZ: GitHub Actions cron is UTC only. Calibrated for Lisbon SUMMER (UTC+1):
#   20:00 Lisbon = 19:00 UTC, 00:00 = 23:00 UTC, 04:00 = 03:00 UTC.
#   Shifts: 19→23 (20–00), 23→03 (00–04), 03→07 UTC (04–08 Lisbon).
# In winter (Lisbon UTC+0) shift the cron to '0 20,0,4 * * *'.

on:
  workflow_dispatch:
  schedule:
    # Three staggered 4h shifts covering Lisbon 20:00–08:00 (summer UTC+1).
    - cron: '0 19,23,3 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

# Unique per run so the fleet never blocks itself or the all-day roadie.yml.
# Within a run, the matrix legs run in parallel (that IS the fleet).
concurrency:
  group: roadie-night-fleet-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # < GitHub's 6h hard kill; drain.sh self-guards at 340
    strategy:
      fail-fast: false     # one worker dying must not cancel the others
      max-parallel: 6
      matrix:
        worker: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps + Claude Code CLI
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm install -g @anthropic-ai/claude-code

      - name: Configure git author
        # Ricardo's identity so Vercel's Git Authorization recognises the committer
        # and runs preview/build checks (required for the merger to see CLEAN PRs).
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Drain the issue queue (worker ${{ matrix.worker }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Subscription auth (Max 20x) — bills the plan, not the API.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ROADIE_WORKER_OFFSET: ${{ matrix.worker }}
          # 4h per shift so three back-to-back launches tile 20:00–08:00 Lisbon
          # without overlapping (overlap would stack workers past 6 and rate-limit).
          WALL_CAP_MIN: '240'
        run: |
          chmod +x .roadie/drain.sh
          .roadie/drain.sh

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadie-night-${{ github.run_id }}-w${{ matrix.worker }}
          path: .agents/roadie-runs/
          retention-days: 7
          if-no-files-found: ignore
