name: Roadie (Watcher + Implementer)

# Drains the ENTIRE open issue queue (ANY label, or none — not just `ai-fix`):
# implements every eligible issue, one branch + PR each, finishing only when no
# issues remain (or the wall-clock guard trips — GitHub kills jobs at 6h, so we
# stop cleanly at ~5h20m and the next run resumes). Eligibility (incl. the
# human-flagged / non-actionable / hold exclusions) is decided in .roadie/drain.sh.
# Replaces the local Roadie + the one-issue-per-run implementer.yml.
# Specs: .roadie/AGENT.md, .agents/github-watcher/WATCHER-AGENT.md

on:
  # React when an issue is opened or reopened. NOT on `labeled` — we churn
  # labels constantly (in-progress/pr-opened/promotions), and each label change
  # fired a full drain run, which was a large, mostly-redundant Actions cost.
  issues:
    types: [opened, reopened]
  # Daytime safety-net poll only. Nights (20:00–08:00 Lisbon) are covered by
  # roadie-night-fleet.yml; this single worker must not overlap it or they'd
  # compete for the Claude subscription rate limit. So launches run only
  # 07:00–17:00 UTC (= 08:00–18:00 Lisbon summer) and WALL_CAP_MIN below bounds
  # each run to 2h, so the last 17:00 launch ends by 19:00 UTC (20:00 Lisbon),
  # exactly when the fleet's first shift starts — a clean day/night handoff.
  # Winter (Lisbon UTC+0): shift to '13 8-18/2 * * *'.
  schedule:
    - cron: '13 7-17/2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two drains at once — they'd race on branches/labels.
concurrency:
  group: roadie-implementer
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # drain.sh self-guards at 320 min, under GitHub's 6h cap
    # drain.sh decides eligibility for every issue; no label gate here.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps + Claude Code CLI
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          npm install -g @anthropic-ai/claude-code

      - name: Configure git author
        # Ricardo's identity so Vercel's Git Authorization recognises the committer
        # and runs preview/build checks (required for the merger to see CLEAN PRs).
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Drain the issue queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Subscription auth (Pro/Max) instead of pay-per-use API billing.
          # CLI uses the OAuth token when ANTHROPIC_API_KEY is absent.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          # Bound each day run to 2h so the last 17:00 UTC launch finishes by
          # 19:00 UTC, before the night fleet starts (no overlap / rate-limit clash).
          WALL_CAP_MIN: '120'
        run: |
          chmod +x .roadie/drain.sh
          .roadie/drain.sh

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadie-run-${{ github.run_id }}
          path: .agents/roadie-runs/
          retention-days: 14
          if-no-files-found: ignore
