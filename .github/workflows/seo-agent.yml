name: SEO Agent

on:
  workflow_dispatch:
  schedule:
    # ⚠️ TZ NOTE: GitHub Actions cron is UTC only. Calibrated for Lisbon SUMMER
    # (UTC+1); in late October shift +1h.
    #
    # 3×/day is deliberate. The idea bank is now BANK-CAPPED (see PROMPT.md): the
    # SEO Agent only files proposals while the open `seo-proposal` count is below
    # the cap, and prune-proposals.yml trims the bank daily. Running 14×/day used
    # to fire 5–7 proposals each time → 300+ parked issues. At a capped bank,
    # extra runs are almost all no-ops, so we run just often enough to keep the
    # bank topped up against fresh metrics: ~morning, midday, evening.
    #   summer UTC 7,13,19 = Lisbon 08:00 / 14:00 / 20:00.
    - cron: '0 7,13,19 * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two SEO instances in parallel — avoids races on seo-plan.md
concurrency:
  group: seo-agent
  cancel-in-progress: false

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project deps
        run: npm ci --no-audit --no-fund

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write service-account credentials
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Configure git author
        # Use Ricardo's identity so Vercel's Git Authorization recognises the
        # committer and doesn't block previews. Agent identity is preserved in
        # the commit message prefix (`seo:`) and via run logs / artifacts.
        run: |
          git config user.name "Ricardo Parro"
          git config user.email "ricardo.parro@gmail.com"

      - name: Fetch fresh GA4 + GSC metrics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: node .agents/scripts/fetch-metrics.cjs

      - name: Run SEO agent via Claude Code CLI
        env:
          # Subscription auth (Pro/Max) instead of pay-per-use API billing.
          # CLI uses the OAuth token when ANTHROPIC_API_KEY is absent.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 2nd subscription — run-claude.sh fails over to it when the primary
          # hits its session/usage limit, so a maxed-out plan doesn't kill the run.
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE: ${{ secrets.GSC_SITE }}
        run: |
          cat .agents/seo/PROMPT.md | bash .agents/scripts/run-claude.sh

      - name: Commit state changes from this run
        if: always()
        run: |
          git add .agents/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No SEO state changes to commit."
          else
            git commit -m "seo: autonomous run state update [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; sleeping $((attempt * 2))s and retrying"
              sleep $((attempt * 2))
              git pull --rebase origin main || true
            done
          fi

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-agent-run-${{ github.run_id }}
          path: .agents/seo/run.log
          retention-days: 30
          if-no-files-found: ignore
