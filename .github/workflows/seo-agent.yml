name: SEO Agent

on:
  workflow_dispatch:
  schedule:
    # Weekly: Mondays 08:00 UTC (~09:00 Lisbon winter / 10:00 summer)
    # GSC data has 2-3 day lag; weekly cadence aligns with stable data window.
    - cron: '0 8 * * 1'

permissions:
  contents: write
  issues: write
  pull-requests: write

# Never run two SEO instances in parallel — avoids races on seo-plan.md
concurrency:
  group: seo-agent
  cancel-in-progress: false

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project deps
        run: npm ci --no-audit --no-fund

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write service-account credentials
        env:
          GA_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/gcp"
          printf '%s' "$GA_JSON" > "$RUNNER_TEMP/gcp/metrics.json"
          chmod 600 "$RUNNER_TEMP/gcp/metrics.json"

      - name: Configure git for the bot user
        run: |
          git config user.name "seo-agent[bot]"
          git config user.email "seo-agent@users.noreply.github.com"

      - name: Fetch fresh GA4 metrics
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node .agents/scripts/fetch-metrics.cjs

      - name: Run SEO agent via Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp/metrics.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          cat .agents/seo/PROMPT.md | claude --print --dangerously-skip-permissions

      - name: Commit state changes from this run
        if: always()
        run: |
          git add .agents/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No SEO state changes to commit."
          else
            git commit -m "seo: weekly run state update [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; sleeping $((attempt * 2))s and retrying"
              sleep $((attempt * 2))
              git pull --rebase origin main || true
            done
          fi

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-agent-run-${{ github.run_id }}
          path: .agents/seo/run.log
          retention-days: 30
          if-no-files-found: ignore
