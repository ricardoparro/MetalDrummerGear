name: Validate URLs

on:
  pull_request:
    paths:
      - 'packages/backend/src/index.js'
      - 'packages/frontend/src/pages/drummer/**'
      - 'packages/data/**'

jobs:
  validate-urls:
    runs-on: ubuntu-latest
    name: Check Changed URLs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT
      
      - name: Extract and Validate URLs from changed files
        run: |
          set +e  # Don't exit on error - we handle exit codes manually
          
          echo "🔍 Checking URLs in changed files only..."
          echo "Changed: ${{ steps.changed.outputs.files }}"
          
          FAILED=0
          TOTAL=0
          WARNINGS=0
          
          # Get the diff for drummer data files
          git diff origin/${{ github.base_ref }} HEAD -- packages/backend/src/index.js packages/frontend/src/pages/drummer/ > /tmp/diff.txt 2>/dev/null || true
          
          # Extract added image URLs from diff (lines starting with +)
          grep -E "^\+.*image:\s*['\"]https?://" /tmp/diff.txt | \
            grep -ohE "https?://[^'\"]+\.(jpg|jpeg|png|gif|webp)" > /tmp/new_image_urls.txt || true
          
          # Extract added YouTube URLs from diff
          grep -E "^\+.*youtube" /tmp/diff.txt | \
            grep -ohE "https?://(www\.)?(youtube\.com/watch\?v=|youtu\.be/)[a-zA-Z0-9_-]+" > /tmp/new_video_urls.txt || true
          
          # Count new URLs (handle empty files)
          IMG_COUNT=$(cat /tmp/new_image_urls.txt 2>/dev/null | grep -c . || echo "0")
          VID_COUNT=$(cat /tmp/new_video_urls.txt 2>/dev/null | grep -c . || echo "0")
          echo "Found $IMG_COUNT new image URLs, $VID_COUNT new video URLs"
          
          if [ "$IMG_COUNT" = "0" ] && [ "$VID_COUNT" = "0" ]; then
            echo "✅ No new URLs to validate"
            exit 0
          fi
          
          echo ""
          echo "🖼️ Checking new image URLs..."
          
          # Function to check URL with retries and rate limit handling
          check_image_url() {
            local url="$1"
            local max_retries=3
            local retry=0
            local status=""
            
            while [ $retry -le $max_retries ]; do
              status=$(curl -s -o /dev/null -w '%{http_code}' \
                --max-time 30 \
                --connect-timeout 15 \
                -A "Mozilla/5.0 (compatible; MetalDrummerGear-CI/1.0; +https://github.com/ricardoparro/MetalDrummerGear)" \
                "$url" 2>/dev/null || echo "000")
              
              # Success
              if [ "$status" = "200" ]; then
                echo "OK"
                return 0
              fi
              
              # Rate limited - exponential backoff retry
              if [ "$status" = "429" ]; then
                retry=$((retry + 1))
                if [ $retry -le $max_retries ]; then
                  local wait=$((5 * retry))
                  echo "RETRY:$wait" >&2
                  sleep $wait
                  continue
                fi
              fi
              
              break
            done
            
            echo "$status"
            return 1
          }
          
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            TOTAL=$((TOTAL + 1))
            
            # Rate limiting delay - longer for Wikimedia
            if echo "$url" | grep -q "wikimedia.org\|wikipedia.org"; then
              sleep 4
            else
              sleep 2
            fi
            
            STATUS=$(check_image_url "$url")
            
            if [ "$STATUS" = "OK" ]; then
              echo "✅ [200] $url"
            elif [ "$STATUS" = "429" ] || [ "$STATUS" = "403" ]; then
              # Rate limited after retries - treat as warning (URL likely valid)
              echo "⚠️ [$STATUS] $url (rate limited - treating as valid)"
              WARNINGS=$((WARNINGS + 1))
            elif [ "$STATUS" = "000" ]; then
              # Timeout - treat as warning for Wikimedia (known rate limiting behavior)
              if echo "$url" | grep -q "wikimedia.org\|wikipedia.org"; then
                echo "⚠️ [$STATUS] $url (timeout - likely rate limited)"
                WARNINGS=$((WARNINGS + 1))
              else
                echo "❌ [$STATUS] $url (timeout)"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ [$STATUS] $url"
              FAILED=$((FAILED + 1))
            fi
          done < /tmp/new_image_urls.txt
          
          echo ""
          echo "🎬 Checking new YouTube URLs..."
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            TOTAL=$((TOTAL + 1))
            sleep 1
            VIDEO_ID=$(echo "$url" | grep -oE '[a-zA-Z0-9_-]{11}' | head -1)
            if [ -n "$VIDEO_ID" ]; then
              OEMBED="https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${VIDEO_ID}&format=json"
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 --retry 2 --retry-delay 3 "$OEMBED" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ $url"
              elif [ "$STATUS" = "429" ]; then
                echo "⚠️ [$STATUS] $url (rate limited)"
                WARNINGS=$((WARNINGS + 1))
              else
                echo "❌ [$STATUS] $url (video unavailable)"
                FAILED=$((FAILED + 1))
              fi
            fi
          done < /tmp/new_video_urls.txt
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Checked: $TOTAL | Valid: $((TOTAL - FAILED - WARNINGS)) | Warnings: $WARNINGS | Broken: $FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ $FAILED -gt 0 ]; then
            echo "❌ VALIDATION FAILED - Fix broken URLs before merging!"
            exit 1
          elif [ $WARNINGS -gt 0 ]; then
            echo "⚠️ PASSED with warnings - $WARNINGS URLs rate-limited but likely valid"
            exit 0
          else
            echo "✅ All new URLs are valid"
            exit 0
          fi
