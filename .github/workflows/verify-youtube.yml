name: Verify YouTube Videos

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC (08:00 in Lisbon winter, 09:00 in summer)
    - cron: '0 7 * * *'
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '.github/workflows/verify-youtube.yml'
      - 'scripts/verify-youtube-ids.cjs'
      - 'packages/frontend/data/**'
      - 'packages/frontend/components/**'
      - 'packages/frontend/App.js'
      - 'api/**'
      - 'packages/backend/src/**'

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Scan for broken YouTube embeds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run YouTube verifier
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/verify-youtube-ids.cjs \
            --json youtube-verification-report.json \
            --create-issues

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-verification-report
          path: youtube-verification-report.json
          retention-days: 30
