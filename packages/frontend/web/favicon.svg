<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    MetalForge Favicon — Crossed Drumsticks + Snare Rim + Forge-Red Spark

    5 Concepts evaluated:

    A (rejected): Metal "M" lettermark with drumstick serifs
      – Generic at any size; zero immediate drumming association at 16×16
      – Lettermarks need brand recognition before they work — we don't have that yet

    B (rejected): Single vertical drumstick, angled
      – Reads as an arrow or pointer at 16×16; loses "drumming" meaning entirely
      – A lone stick has no visual anchor to rhythm or percussion

    C (rejected): Concentric snare-drum rings (top view, no sticks)
      – Reads as CD / vinyl / bullseye at small sizes
      – No metal energy; could belong to any music genre

    D (rejected): Drumstick striking a cymbal from the side
      – Requires two distinct shapes with spatial relationship — lost at 16×16
      – The cymbal arc and stick angle blend into noise at tiny resolutions

    E (CHOSEN): Snare rim ring + full-canvas crossed drumsticks X + forge-red centre spark
      – Silver ring reads instantly as a drum bezel at 16, 32, 48, and 512px
      – Bold X extends corner-to-corner: maximum silhouette impact at tiny sizes
      – Sticks extend beyond the drum — classic "crossed tools" trophy motif
      – Forge-red dot anchors the crossing and carries the MetalForge brand accent
      – Three high-contrast colour tiers (near-black / silver / forge-red) all
        survive at 16×16 px with zero detail loss
      – Full-square viewport fill prevents white browser-corner bleed

    Palette:
      Background:  #0a0a0a  (near-black — matches site dark theme)
      Rim:         #c8c8c8  (bright silver — drum hardware)
      Head:        #0f0f0f  (deep charcoal — batter-head surface)
      Sticks:      #d4d4d4  (light silver — high contrast against dark surfaces)
      Accent:      #dc2626  (MetalForge forge-red — single brand colour)
  -->

  <defs>
    <clipPath id="mf-head">
      <circle cx="16" cy="16" r="10.5"/>
    </clipPath>
  </defs>

  <!-- Background: full-square fill so corners are never browser-default white -->
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- Crossed drumsticks: full corner-to-corner X for maximum bold silhouette -->
  <!-- These show against the dark background outside the drum rim -->
  <line x1="2"  y1="2"  x2="30" y2="30"
        stroke="#d4d4d4" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="30" y1="2"  x2="2"  y2="30"
        stroke="#d4d4d4" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Drum rim: bold silver ring — drawn on top to unify the composition -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c8c8c8" stroke-width="5"/>

  <!-- Drum batter head: dark charcoal surface inside the rim -->
  <circle cx="16" cy="16" r="10.5" fill="#0f0f0f"/>

  <!-- Sticks redrawn on head — clipped to head circle for high contrast on dark -->
  <g clip-path="url(#mf-head)">
    <line x1="2"  y1="2"  x2="30" y2="30"
          stroke="#d4d4d4" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="30" y1="2"  x2="2"  y2="30"
          stroke="#d4d4d4" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Forge-red spark: brand accent at the stick-crossing point -->
  <circle cx="16" cy="16" r="4" fill="#dc2626"/>
</svg>
