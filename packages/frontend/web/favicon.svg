<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    MetalForge favicon — Snare Drum + Crossed Drumsticks

    Concept A (rejected): pure snare drum rings — clean but reads as CD/record
    Concept B (rejected): single drumstick striking — reads as arrow/pointer at 16x16
    Concept C (rejected): metal "M" lettermark — too generic, weak brand recall
    Concept D (rejected): anvil + drum — too many elements, detail lost at 16x16
    Concept E (CHOSEN): snare drum ring + crossed sticks + forge-red centre
      – The outer silver ring instantly frames it as a drum at every size
      – The X sticks inside carry the "drumstick" symbol without adding extra shape
      – The forge-red centre dot is the MetalForge brand accent and the stick-crossing point
      – Three levels of contrast (silver ring / mid-grey sticks / red dot) survive down to 16×16
      – Circular silhouette fills a square browser tab naturally
  -->
  <defs>
    <clipPath id="mf-head">
      <circle cx="16" cy="16" r="11.8"/>
    </clipPath>
  </defs>

  <!-- Deep-charcoal background -->
  <circle cx="16" cy="16" r="16" fill="#0d0d0d"/>

  <!-- Drum rim — bold silver ring (the snare shell hoop) -->
  <circle cx="16" cy="16" r="13.3" fill="none" stroke="#c4c4c4" stroke-width="3.8"/>

  <!-- Drum batter head — dark surface inside the rim -->
  <circle cx="16" cy="16" r="11.8" fill="#161616"/>

  <!-- Crossed drumsticks lying on the head, clipped to the head circle -->
  <g clip-path="url(#mf-head)">
    <!-- Stick 1: bead at lower-right, butt at upper-left -->
    <line x1="7"  y1="7"  x2="25" y2="25" stroke="#b8b8b8" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Stick 2: bead at lower-left, butt at upper-right -->
    <line x1="25" y1="7"  x2="7"  y2="25" stroke="#b8b8b8" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Forge-red centre — brand accent at the crossing point -->
  <circle cx="16" cy="16" r="3.4" fill="#dc2626"/>
  <!-- Specular highlight on the forge dot -->
  <circle cx="14.9" cy="14.9" r="1.3" fill="#ff6868" opacity="0.6"/>
</svg>
