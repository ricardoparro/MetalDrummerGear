<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    
    <!-- Favicon: Rock on 🤘 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a1a1a" />
    
    <!-- Resource Hints: Reduce HTTP request latency by early DNS/connection -->
    <!-- Preconnect to critical external domains (DNS + TCP + TLS handshake) -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://img.youtube.com" crossorigin />
    <link rel="preconnect" href="https://ui-avatars.com" crossorigin />
    <link rel="preconnect" href="https://upload.wikimedia.org" crossorigin />
    
    <!-- DNS Prefetch for less critical domains -->
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://commons.wikimedia.org" />
    
    <!-- Preconnect to YouTube for video embeds (deferred to not block LCP) -->
    <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
    
    <!-- Preload critical API endpoint for faster data loading -->
    <link rel="preload" href="/api/init" as="fetch" crossorigin />
    
    <!-- Preload LCP hero image (first drummer: Lars Ulrich) with high priority -->
    <link rel="preload" href="/images/drummers/lars-ulrich.webp" as="image" type="image/webp" fetchpriority="high" />
    
    <!-- SEO Meta Tags -->
    <title>MetalForge - Discover What Pro Metal Drummers Play</title>
    <meta name="description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <link rel="canonical" href="https://metalforge.io/" />
    
    <!-- AI/LLM Discovery -->
    <link rel="alternate" type="text/plain" href="https://metalforge.io/llms.txt" title="LLM Site Information" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://metalforge.io/" />
    <meta property="og:site_name" content="MetalForge" />
    <meta property="og:title" content="MetalForge - Metal Drummer Gear Database" />
    <meta property="og:description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <meta property="og:image" content="https://metalforge.io/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MetalForge - Metal Drummer Gear Database" />
    <meta name="twitter:description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <meta name="twitter:image" content="https://metalforge.io/og-image.png" />

    <!-- Critical CSS: Inlined for fastest first paint -->
    <style id="expo-reset">
      /* ====================================
         Theme CSS Variables (Dark/Light Mode Support - Issue #306)
         ==================================== */
      
      /* Dark theme (default) */
      :root,
      [data-theme="dark"],
      .theme-dark {
        --theme-background: #121212;
        --theme-background-base: #0a0a0a;
        --theme-text: #ffffff;
        --theme-text-secondary: #aaaaaa;
        --theme-card: #1e1e1e;
        --theme-border: #333333;
        --theme-primary: #ef4444;
        --theme-error: #ef5350;
        --theme-input-bg: #1e1e1e;
        --theme-input-placeholder: #888888;
        --theme-skeleton-base: #2a2a2a;
        --theme-skeleton-highlight: #3a3a3a;
        color-scheme: dark;
      }
      
      /* Light theme */
      [data-theme="light"],
      .theme-light {
        --theme-background: #f5f5f5;
        --theme-background-base: #ffffff;
        --theme-text: #1a1a1a;
        --theme-text-secondary: #666666;
        --theme-card: #ffffff;
        --theme-border: #e0e0e0;
        --theme-primary: #dc2626;
        --theme-error: #d32f2f;
        --theme-input-bg: #ffffff;
        --theme-input-placeholder: #999999;
        --theme-skeleton-base: #e0e0e0;
        --theme-skeleton-highlight: #f0f0f0;
        color-scheme: light;
      }
      
      /* Respect system preference when no user preference is set */
      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          --theme-background: #f5f5f5;
          --theme-background-base: #ffffff;
          --theme-text: #1a1a1a;
          --theme-text-secondary: #666666;
          --theme-card: #ffffff;
          --theme-border: #e0e0e0;
          --theme-primary: #dc2626;
          --theme-error: #d32f2f;
          --theme-input-bg: #ffffff;
          --theme-input-placeholder: #999999;
          --theme-skeleton-base: #e0e0e0;
          --theme-skeleton-highlight: #f0f0f0;
          color-scheme: light;
        }
      }
      
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        /* Smooth font rendering */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        /* Prevent text size adjustment on orientation change */
        -webkit-text-size-adjust: 100%;
        /* Use CSS variables for theme colors */
        background-color: var(--theme-background-base, #0a0a0a);
        color: var(--theme-text, #ffffff);
        /* Smooth color transitions for theme switching */
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background-color: var(--theme-background, #121212);
        transition: background-color 0.3s ease;
      }
      /* Newsletter form placeholder contrast - theme aware */
      .newsletter-input::placeholder,
      input[type="email"]::placeholder {
        color: var(--theme-input-placeholder, #888888) !important;
        opacity: 1;
      }
      
      /* ====================================
         CLS Prevention: Reserve space for dynamic content
         ==================================== */
      
      /* Images: Always reserve aspect ratio space */
      img {
        max-width: 100%;
        height: auto;
        /* Prevent layout shifts from image loading - theme aware */
        background-color: var(--theme-skeleton-base, #2a2a2a);
        transition: background-color 0.3s ease;
      }
      
      /* Skeleton shimmer animation */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      
      .skeleton {
        background: linear-gradient(90deg, var(--theme-skeleton-base, #2a2a2a) 25%, var(--theme-skeleton-highlight, #3a3a3a) 50%, var(--theme-skeleton-base, #2a2a2a) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite ease-in-out;
      }
      
      /* Content containment for performance */
      .contain-content {
        contain: content;
      }
      
      .contain-layout {
        contain: layout;
      }
      
      /* Content visibility for off-screen optimization */
      .content-auto {
        content-visibility: auto;
        contain-intrinsic-size: auto 500px;
      }
      
      /* CLS Prevention: Reserve space for spotlight section (Issue #312) */
      [class*="spotlightContainer"] {
        min-height: 280px;
        contain: layout style;
      }
      
      /* CLS Prevention: Reserve space for drummer cards (Issue #312) */
      [class*="drummerCard"], [class*="card"] {
        min-height: 80px;
        contain: layout;
      }
      
      /* CLS Prevention: Reserve space for video containers (Issue #442) */
      [class*="videoContainer"], iframe[src*="youtube"] {
        aspect-ratio: 16 / 9;
        background-color: #1a1a1a;
        contain: layout;
      }
      
      /* TBT Optimization: Content visibility for off-screen list items (#460) */
      [class*="drummerCard"]:nth-child(n+5) {
        content-visibility: auto;
        contain-intrinsic-size: auto 80px;
      }
      
      /* CLS Prevention: Ensure images have dimensions (Issue #442) */
      img[width][height] {
        aspect-ratio: attr(width) / attr(height);
      }
      
      /* ====================================
         INP Optimization: Touch/Click responsiveness (Issue #442)
         ==================================== */
      
      /* Fast touch response */
      a, button, [role="button"], [tabindex="0"] {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Optimize interactive elements for faster response */
      a:active, button:active, [role="button"]:active {
        transform: scale(0.98);
        transition: transform 0.05s ease-out;
      }
      
      /* Ensure pointer events work immediately */
      * {
        -webkit-touch-callout: none;
      }
      
      /* Reduce paint on scroll */
      [class*="scroll"], [class*="list"] {
        will-change: scroll-position;
      }
      
      /* ====================================
         LCP Optimization: Prioritize visible content
         ==================================== */
      
      /* Above-fold content priority */
      .lcp-priority {
        /* Hint to browser this is important */
        will-change: auto;
      }
      
      /* Defer animations until after LCP */
      @media (prefers-reduced-motion: no-preference) {
        .animate-after-lcp {
          animation-play-state: paused;
        }
        .lcp-complete .animate-after-lcp {
          animation-play-state: running;
        }
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    
    <!-- Google Analytics (GA4) - Deferred to reduce blocking requests -->
    <!-- Moved to end of body for better page load performance -->
    <script>
      // Defer GA4 loading until after page interactive
      if (typeof requestIdleCallback === 'function') {
        requestIdleCallback(initGA4);
      } else {
        // Fallback for browsers without requestIdleCallback
        setTimeout(initGA4, 2000);
      }
      
      function initGA4() {
        // === CI/BOT DETECTION (Multi-layer protection) ===
        
        // Layer 1: URL parameter detection
        var urlHasCITest = window.location.search.includes('ci_test');
        
        // Persist ci_test flag for entire session (survives SPA navigation)
        if (urlHasCITest) {
          try { sessionStorage.setItem('ci_test', '1'); } catch(e) {}
        }
        
        // Check both URL and sessionStorage
        var isCITest = urlHasCITest || 
          (function() { try { return sessionStorage.getItem('ci_test') === '1'; } catch(e) { return false; } })();
        
        // Layer 2: Detect headless/automated browsers (Playwright, Puppeteer, etc)
        var isAutomated = /HeadlessChrome|Playwright|Puppeteer/i.test(navigator.userAgent);
        
        // Layer 3: Detect common bots and crawlers
        var isBot = /bot|crawl|spider|lighthouse|PageSpeed/i.test(navigator.userAgent);
        
        // Skip analytics for CI, automation, or bots
        if (isCITest || isAutomated || isBot) {
          console.log('[GA4] Skipped -', isCITest ? 'CI test session' : isAutomated ? 'Automated browser' : 'Bot detected');
          return;
        }
        
        // Layer 4: Skip non-production domains (Vercel previews, localhost, etc)
        var isProd = window.location.hostname === 'metalforge.io' || window.location.hostname === 'www.metalforge.io';
        if (!isProd) {
          console.log('[GA4] Skipped - Non-production:', window.location.hostname);
          return;
        }
        
        // === LOAD GA4 ===
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-HKLHH1DCC7';
        document.head.appendChild(script);
        
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-HKLHH1DCC7');
      }
    </script>
  </body>
</html>
