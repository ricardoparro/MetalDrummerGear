    <!-- Critical CSS: Inlined for fastest first paint -->
    <style id="expo-reset">
      /* ====================================
         Theme CSS Variables (Dark/Light Mode Support - Issue #306)
         ==================================== */
      
      /* Dark theme (default) */
      :root,
      [data-theme="dark"],
      .theme-dark {
        --theme-background: #0a0a0a;
        --theme-background-base: #0a0a0a;
        --theme-text: #ffffff;
        --theme-text-secondary: #a1a1aa;
        --theme-card: #141414;
        --theme-border: #27272a;
        --theme-primary: #dc2626;
        --theme-error: #ef5350;
        --theme-input-bg: #1e1e1e;
        --theme-input-placeholder: #9a9a9a;
        --theme-skeleton-base: #1e1e1e;
        --theme-skeleton-highlight: #27272a;
        color-scheme: dark;
      }
      
      /* Light theme */
      [data-theme="light"],
      .theme-light {
        --theme-background: #f5f5f5;
        --theme-background-base: #ffffff;
        --theme-text: #1a1a1a;
        --theme-text-secondary: #595959;
        --theme-card: #ffffff;
        --theme-border: #e0e0e0;
        --theme-primary: #dc2626;
        --theme-error: #d32f2f;
        --theme-input-bg: #ffffff;
        --theme-input-placeholder: #767676;
        --theme-skeleton-base: #e0e0e0;
        --theme-skeleton-highlight: #f0f0f0;
        color-scheme: light;
      }
      
      /* Respect system preference when no user preference is set */
      @media (prefers-color-scheme: light) {
        :root:not([data-theme]) {
          --theme-background: #f5f5f5;
          --theme-background-base: #ffffff;
          --theme-text: #1a1a1a;
          --theme-text-secondary: #595959;
          --theme-card: #ffffff;
          --theme-border: #e0e0e0;
          --theme-primary: #dc2626;
          --theme-error: #d32f2f;
          --theme-input-bg: #ffffff;
          --theme-input-placeholder: #767676;
          --theme-skeleton-base: #e0e0e0;
          --theme-skeleton-highlight: #f0f0f0;
          color-scheme: light;
        }
      }
      
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        /* Smooth font rendering */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        /* Prevent text size adjustment on orientation change */
        -webkit-text-size-adjust: 100%;
        /* Use CSS variables for theme colors */
        background-color: var(--theme-background-base, #0a0a0a);
        color: var(--theme-text, #ffffff);
        /* Smooth color transitions for theme switching */
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background-color: var(--theme-background, #0a0a0a);
        transition: background-color 0.3s ease;
      }
      /* Newsletter form placeholder contrast - theme aware */
      .newsletter-input::placeholder,
      input[type="email"]::placeholder {
        color: var(--theme-input-placeholder, #888888) !important;
        opacity: 1;
      }
      
      /* ====================================
         CLS Prevention: Reserve space for dynamic content
         ==================================== */
      
      /* Images: Always reserve aspect ratio space */
      img {
        max-width: 100%;
        height: auto;
        /* Prevent layout shifts from image loading - theme aware */
        background-color: var(--theme-skeleton-base, #2a2a2a);
        transition: background-color 0.3s ease;
      }
      
      /* Skeleton shimmer animation */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      
      .skeleton {
        background: linear-gradient(90deg, var(--theme-skeleton-base, #2a2a2a) 25%, var(--theme-skeleton-highlight, #3a3a3a) 50%, var(--theme-skeleton-base, #2a2a2a) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite ease-in-out;
      }
      
      /* Content containment for performance */
      .contain-content {
        contain: content;
      }
      
      .contain-layout {
        contain: layout;
      }
      
      /* Content visibility for off-screen optimization */
      .content-auto {
        content-visibility: auto;
        contain-intrinsic-size: auto 500px;
      }
      
      /* CLS Prevention: Reserve space for spotlight section (Issue #312) */
      [class*="spotlightContainer"] {
        min-height: 280px;
        contain: layout style;
      }
      
      /* CLS Prevention: Reserve space for drummer cards (Issue #312) */
      [class*="drummerCard"], [class*="card"] {
        min-height: 80px;
        contain: layout;
      }
      
      /* CLS Prevention: Reserve space for video containers (Issue #442) */
      [class*="videoContainer"], iframe[src*="youtube"] {
        aspect-ratio: 16 / 9;
        background-color: #1a1a1a;
        contain: layout;
      }
      
      /* TBT Optimization: Content visibility for off-screen list items (#460) */
      [class*="drummerCard"]:nth-child(n+5) {
        content-visibility: auto;
        contain-intrinsic-size: auto 80px;
      }
      
      /* CLS Prevention: Ensure images have dimensions (Issue #442) */
      img[width][height] {
        aspect-ratio: attr(width) / attr(height);
      }
      
      /* ====================================
         INP Optimization: Touch/Click responsiveness (Issue #442)
         ==================================== */
      
      /* Fast touch response */
      a, button, [role="button"], [tabindex="0"] {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Optimize interactive elements for faster response */
      a:active, button:active, [role="button"]:active {
        transform: scale(0.98);
        transition: transform 0.05s ease-out;
      }
      
      /* Ensure pointer events work immediately */
      * {
        -webkit-touch-callout: none;
      }
      
      /* Reduce paint on scroll */
      [class*="scroll"], [class*="list"] {
        will-change: scroll-position;
      }
      
      /* ====================================
         LCP Optimization (#752): Prioritize visible content
         ==================================== */
      
      /* Above-fold content priority */
      .lcp-priority {
        /* Hint to browser this is important */
        will-change: auto;
      }
      
      /* Critical hero content - ensure immediate rendering */
      #critical-hero {
        contain: layout style;
      }
      
      #critical-hero h1 {
        /* Ensure text renders immediately without font blocking */
        font-display: swap;
        /* Hint that this is the LCP element */
        content-visibility: visible;
      }
      
      /* Skeleton animations should not block LCP */
      #critical-hero .skeleton {
        animation-delay: 100ms; /* Slight delay prevents competing with LCP */
      }
      
      /* ====================================
         Similar Drummers Widget Hover Effects (Issue #643)
         ==================================== */
      .similar-drummer-link > div {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .similar-drummer-link:hover > div {
        transform: translateY(-4px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }
      
      /* Defer animations until after LCP */
      @media (prefers-reduced-motion: no-preference) {
        .animate-after-lcp {
          animation-play-state: paused;
        }
        .lcp-complete .animate-after-lcp {
          animation-play-state: running;
        }
      }
    </style>
  </head>

    <!-- Remove critical-hero once React hydrates to avoid flash -->
    <script>
      // Remove static content once React mounts (prevents flash)
      var observer = new MutationObserver(function(mutations) {
        var hero = document.getElementById('critical-hero');
        if (hero && hero.parentElement.childElementCount > 1) {
          hero.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
