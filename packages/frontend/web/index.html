<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    
    <!-- Resource Hints: Reduce HTTP request latency by early DNS/connection -->
    <!-- Preconnect to critical external domains (DNS + TCP + TLS handshake) -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="preconnect" href="https://img.youtube.com" crossorigin />
    <link rel="preconnect" href="https://ui-avatars.com" crossorigin />
    
    <!-- DNS Prefetch for less critical domains -->
    <link rel="dns-prefetch" href="https://www.youtube.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    
    <!-- Preload critical API endpoint for faster data loading -->
    <link rel="preload" href="/api/init" as="fetch" crossorigin />
    
    <!-- Preload LCP hero image (first drummer: Lars Ulrich) with high priority -->
    <link rel="preload" href="/images/drummers/lars-ulrich.webp" as="image" type="image/webp" fetchpriority="high" />
    
    <!-- SEO Meta Tags -->
    <title>MetalForge - Discover What Pro Metal Drummers Play</title>
    <meta name="description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <link rel="canonical" href="https://metalforge.io/" />
    
    <!-- AI/LLM Discovery -->
    <link rel="alternate" type="text/plain" href="https://metalforge.io/llms.txt" title="LLM Site Information" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://metalforge.io/" />
    <meta property="og:site_name" content="MetalForge" />
    <meta property="og:title" content="MetalForge - Metal Drummer Gear Database" />
    <meta property="og:description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <meta property="og:image" content="https://metalforge.io/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MetalForge - Metal Drummer Gear Database" />
    <meta name="twitter:description" content="Explore the drum kits, cymbals, and gear used by legendary metal drummers. Discover what Lars Ulrich, Joey Jordison, Dave Lombardo and 50+ pro drummers play, compare setups, and find your perfect gear." />
    <meta name="twitter:image" content="https://metalforge.io/og-image.png" />

    <!-- Critical CSS: Inlined for fastest first paint -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Newsletter form placeholder contrast for dark theme */
      .newsletter-input::placeholder,
      input[type="email"]::placeholder {
        color: #888888 !important;
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    
    <!-- Google Analytics (GA4) - Deferred to reduce blocking requests -->
    <!-- Moved to end of body for better page load performance -->
    <script>
      // Defer GA4 loading until after page interactive
      if (typeof requestIdleCallback === 'function') {
        requestIdleCallback(initGA4);
      } else {
        // Fallback for browsers without requestIdleCallback
        setTimeout(initGA4, 2000);
      }
      
      function initGA4() {
        // Skip GA4 for CI/E2E tests to avoid inflating analytics
        if (window.location.search.includes('ci_test')) {
          console.log('[GA4] Skipped - CI test detected');
          return;
        }
        
        // Load GA4 script dynamically
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-HKLHH1DCC7';
        document.head.appendChild(script);
        
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-HKLHH1DCC7');
      }
    </script>
  </body>
</html>
