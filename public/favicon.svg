<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15.5"/>
    </clipPath>
  </defs>

  <!-- Deep-charcoal background circle -->
  <circle cx="16" cy="16" r="15.5" fill="#0a0a0a"/>

  <g clip-path="url(#c)">
    <!-- Stick 1: handle at bottom-left, bead (tip) at top-right.
         Tapers from 4.4 px wide at handle to 2 px wide near bead. -->
    <g transform="rotate(-42 16 16)">
      <path d="M3.5,13.8 L27.5,15 L27.5,17 L3.5,18.2 Z" fill="#c8c8c8"/>
      <ellipse cx="3.5" cy="16" rx="1.3" ry="2.2" fill="#c8c8c8"/>
      <circle cx="28" cy="16" r="1.7" fill="#d8d8d8"/>
    </g>

    <!-- Stick 2: handle at bottom-right, bead (tip) at top-left.
         Mirror of stick 1: bead on LEFT in local coords, handle on RIGHT. -->
    <g transform="rotate(42 16 16)">
      <path d="M4.5,15 L28.5,13.8 L28.5,18.2 L4.5,17 Z" fill="#c8c8c8"/>
      <circle cx="4" cy="16" r="1.7" fill="#d8d8d8"/>
      <ellipse cx="28.5" cy="16" rx="1.3" ry="2.2" fill="#c8c8c8"/>
    </g>

    <!-- Forge spark: brand-red hot spot at the crossing point -->
    <circle cx="16" cy="16" r="2.4" fill="#dc2626"/>
    <!-- Specular highlight on spark for subtle depth -->
    <circle cx="15.2" cy="15.2" r="0.9" fill="#ff6060" opacity="0.75"/>
  </g>
</svg>
