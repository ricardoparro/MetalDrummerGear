<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15.5"/>
    </clipPath>
  </defs>

  <!-- Deep-charcoal background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d0d0d"/>

  <g clip-path="url(#c)">
    <!-- Drumstick 1: bead at lower-right, handle (butt cap) at upper-left.
         Shaft tapers from 5.6 px wide at handle to 3 px at bead end. -->
    <g transform="rotate(42 16 16)">
      <polygon points="2,13.2 27,14.5 27,17.5 2,18.8" fill="#d8d8d8"/>
      <ellipse cx="2" cy="16" rx="1.5" ry="2.8" fill="#b8b8b8"/>
      <circle cx="28.5" cy="16" r="3.0" fill="#ebebeb"/>
    </g>

    <!-- Drumstick 2: bead at lower-left, handle at upper-right (mirror). -->
    <g transform="rotate(-42 16 16)">
      <polygon points="5,14.5 30,13.2 30,18.8 5,17.5" fill="#d8d8d8"/>
      <circle cx="3.5" cy="16" r="3.0" fill="#ebebeb"/>
      <ellipse cx="30" cy="16" rx="1.5" ry="2.8" fill="#b8b8b8"/>
    </g>

    <!-- Forge hot-spot at crossing centre — brand red -->
    <circle cx="16" cy="16" r="3.5" fill="#dc2626"/>
    <!-- Specular highlight on spark -->
    <circle cx="14.8" cy="14.8" r="1.4" fill="#ff7070" opacity="0.65"/>
  </g>
</svg>
