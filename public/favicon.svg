<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Rock on hand (devil horns) -->
  <g fill="url(#metalGrad)">
    <!-- Palm -->
    <ellipse cx="16" cy="20" rx="5" ry="4"/>
    <!-- Index finger (up) -->
    <rect x="10" y="8" width="3" height="10" rx="1.5"/>
    <!-- Pinky finger (up) -->
    <rect x="19" y="8" width="3" height="10" rx="1.5"/>
    <!-- Middle finger (down/curled) -->
    <rect x="12.5" y="14" width="2.5" height="5" rx="1.25"/>
    <!-- Ring finger (down/curled) -->
    <rect x="17" y="14" width="2.5" height="5" rx="1.25"/>
    <!-- Thumb (curled over) -->
    <ellipse cx="12" cy="22" rx="2.5" ry="1.5" transform="rotate(-30 12 22)"/>
  </g>
</svg>
